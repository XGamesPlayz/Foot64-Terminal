<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Foot64 Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    color: #00ff66;
    font-family: 'Press Start 2P', monospace;
}

/* TITLE */
#terminalTitle {
    position: fixed;
    top: 10px;
    right: 10px;
    text-align: right;
}

#terminalTitle h1 { margin:0;font-size:14px; }
#terminalTitle p { margin:4px 0 0;font-size:8px;opacity:0.8; }

#container { display:flex;height:100vh; }

/* ACTION BAR */
#actionsBar {
    width:25%;
    border-right:2px solid #00ff66;
    padding:15px;
    box-sizing:border-box;
}

#actionsTitle {
    text-align:center;
    border-bottom:2px solid #00ff66;
    padding-bottom:6px;
}

#actionsContent {
    font-size:10px;
    overflow-y:auto;
    height:calc(100% - 40px);
}

.actionLine { margin-bottom:6px; }

/* INTRO */
#intro {
    width:75%;
    padding:30px;
}

#introText {
    white-space:pre-line;
    margin-bottom:20px;
}

/* MAIN */
#main {
    width:75%;
    padding:30px;
    display:none;
    opacity:0;
    transition:opacity 1s;
}

input,button{
    background:black;
    border:2px solid #00ff66;
    color:#00ff66;
    font-family:'Press Start 2P',monospace;
    padding:10px;
    font-size:12px;
}

button:hover{
    background:#00ff66;
    color:black;
    cursor:pointer;
}

#videoContainer{
    margin-top:25px;
    display:none;
}

/* Scanlines */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(
        to bottom,
        rgba(0,255,102,0.03),
        rgba(0,255,102,0.03) 1px,
        transparent 1px,
        transparent 3px
    );
    pointer-events:none;
}
</style>
</head>

<body>

<div id="terminalTitle">
<h1>Foot64 Terminal</h1>
<p>Made by the Foot64 Team</p>
</div>

<div id="container">

<!-- ACTIONS -->
<div id="actionsBar">
<div id="actionsTitle">ACTIONS</div>
<div id="actionsContent"></div>
</div>

<!-- PASSWORD INTRO -->
<div id="intro">

<p id="introText"></p>

<input type="password" id="startPassword" placeholder="ENTER PASSWORD">
<button onclick="checkStartPassword()">INITIATE</button>

<p id="startStatus"></p>

</div>

<!-- MAIN TERMINAL -->
<div id="main">

<p>AUTHORIZATION REQUIRED</p>
<p>ENTER ACCESS CODE</p>

<input type="password" id="password">
<button onclick="checkPassword()">EXECUTE</button>

<p id="status"></p>

<div id="videoContainer">
<iframe id="secretVideo"
width="560"
height="315"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</div>

</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const START_PASSWORD = "TheConsequences";

/* VIDEO MAP */
const videos = {
"035":"https://www.youtube.com/embed/QS-AeoMsm3o?autoplay=1",
"Peak":"https://www.youtube.com/embed/pOzLZoC_xTY?autoplay=1",
"005":"https://www.youtube.com/embed/a2OEN4uHg_A?autoplay=1",
"003":"https://www.youtube.com/embed/0NSVrBmI41w?autoplay=1",
"Leph":"https://www.youtube.com/embed/sCzfeYz31ic?autoplay=1",
"0.7":"https://www.youtube.com/embed/-faTSqjc92g?autoplay=1",
"0.7 2":"https://www.youtube.com/embed/W0M0xVfv_2g?autoplay=1",
"BigINeedThis":"https://www.youtube.com/embed/c0hnl6TJupQ?autoplay=1",
"Guide":"https://www.youtube.com/embed/opWkF-r4UKA?autoplay=1",
"FleshyThing":"https://www.youtube.com/embed/76aNFkrTaTY?autoplay=1"
};

const introText = document.getElementById("introText");
const intro = document.getElementById("intro");
const main = document.getElementById("main");
const startStatus = document.getElementById("startStatus");

const status = document.getElementById("status");
const iframe = document.getElementById("secretVideo");
const videoBox = document.getElementById("videoContainer");
const logBox = document.getElementById("actionsContent");

/* ACTION LOGGER */
function logAction(text){
const line=document.createElement("div");
line.className="actionLine";
line.textContent="> "+text;
logBox.appendChild(line);
logBox.scrollTop=logBox.scrollHeight;
}

/* TYPE EFFECT */
function typeText(el,text,speed=35){
el.textContent="";
let i=0;
const interval=setInterval(()=>{
el.textContent+=text[i];
i++;
if(i>=text.length)clearInterval(interval);
},speed);
}

/* BOOT */
logAction("SYSTEM STARTED");
logAction("AWAITING AUTHORIZATION");

typeText(introText,"ENTER SYSTEM PASSWORD TO INITIATE TERMINAL");

/* START PASSWORD CHECK */
window.checkStartPassword=()=>{
const input=document.getElementById("startPassword").value.trim();

if(input===START_PASSWORD){

typeText(startStatus,"PASSWORD ACCEPTED");
logAction("PASSWORD ACCEPTED");

intro.style.display="none";
main.style.display="block";
setTimeout(()=>main.style.opacity="1",50);

logAction("TERMINAL INITIALIZED");
logAction("SESSION STARTED");

}else{

typeText(startStatus,"PASSWORD WRONG");
logAction("PASSWORD WRONG");

}
};

/* MAIN CODE CHECK */
window.checkPassword=()=>{
const input=document.getElementById("password").value.trim();

if(videos[input]){
typeText(status,"ACCESS GRANTED");
iframe.src=videos[input];
videoBox.style.display="block";
logAction(`CODE "${input}" ACCEPTED`);
}else{
typeText(status,"ACCESS DENIED");
iframe.src="";
videoBox.style.display="none";
logAction(`CODE "${input}" DENIED`);
}
};

});
</script>

</body>
</html>
